version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: yt_agent_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-""}
    ports:
      - "6379:6379"
    networks:
      - yt_agent_network
    # DEVOPS-2: health check so dependent services wait until Redis is ready
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: yt_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://localhost
    volumes:
      - ./backend/temp_video_cache:/app/temp_video_cache
    depends_on:
      redis:
        condition: service_healthy   # DEVOPS-2: wait until Redis passes its ping
    networks:
      - yt_agent_network
    # DEVOPS-2: health check so the frontend service waits for the API to be up
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: yt_agent_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy   # DEVOPS-2: wait until backend API is responding
    networks:
      - yt_agent_network

networks:
  yt_agent_network:
    driver: bridge
